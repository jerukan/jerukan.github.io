<script>
/* NOTE: this page is served through the `compress` layout, which strips all
   newlines. Use only block comments here -- `//` line comments would comment
   out the rest of the (single-line) script and break it. */
(function () {
  /* Author records (from _data/authors.yml) keyed by name; `uri` is the
     personal-site link. The site owner's name is bolded wherever it appears. */
  var authors = {{ site.data.authors | jsonify }};
  var owner = {{ site.author.name | jsonify }};

  /* Turn a BibTeX name ("Yan, Jerry" or "Jerry Yan") into "Jerry Yan". */
  function formatName(raw) {
    raw = raw.replace(/[{}]/g, '').trim();
    var comma = raw.indexOf(',');
    if (comma !== -1) {
      return (raw.slice(comma + 1).trim() + ' ' + raw.slice(0, comma).trim()).trim();
    }
    return raw;
  }

  /* Pull the author field out of a BibTeX entry and split into names. */
  function parseAuthors(bibtex) {
    var m = bibtex.match(/author\s*=\s*[{"]([\s\S]*?)[}"]\s*,?\s*$/im);
    if (!m) { return []; }
    return m[1].split(/\s+and\s+/).map(formatName).filter(Boolean);
  }

  /* Normalize a name for comparison against the asterisk list. */
  function normName(s) {
    return s.replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function render(container, names, asteriskNames, note) {
    container.textContent = '';

    var starred = {};
    (asteriskNames || []).forEach(function (n) { starred[normName(n)] = true; });

    names.forEach(function (name, i) {
      var node;
      if (name === owner) {
        /* The site owner's own name: bold, solid text, never a link. */
        node = document.createElement('strong');
        node.className = 'pub-item__me';
        node.textContent = name;
      } else {
        var url = authors[name] && authors[name].uri;
        if (url) {
          node = document.createElement('a');
          node.href = url;
        } else {
          node = document.createElement('span');
        }
        node.textContent = name;
      }
      container.appendChild(node);
      if (starred[normName(name)]) {
        var sup = document.createElement('sup');
        sup.className = 'pub-author-asterisk';
        sup.textContent = '*';
        container.appendChild(sup);
      }
      if (i < names.length - 1) {
        container.appendChild(document.createTextNode(', '));
      }
    });

    /* The asterisk legend, placed directly under the author list. */
    if (note) {
      var noteEl = document.createElement('p');
      noteEl.className = 'pub-authors-note';
      noteEl.textContent = '* ' + note;
      container.insertAdjacentElement('afterend', noteEl);
    }
  }

  function run() {
    var containers = document.querySelectorAll('.js-pub-authors[data-bibtex-url]');
    Array.prototype.forEach.call(containers, function (c) {
      var asteriskNames = [];
      try {
        asteriskNames = JSON.parse(c.getAttribute('data-asterisk-authors') || '[]');
      } catch (e) { asteriskNames = []; }
      var note = c.getAttribute('data-asterisk-note') || '';
      fetch(c.getAttribute('data-bibtex-url'))
        .then(function (r) { return r.text(); })
        .then(function (t) { render(c, parseAuthors(t), asteriskNames, note); })
        .catch(function () {});
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
